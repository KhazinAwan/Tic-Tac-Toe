<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Tic-Tac-Toe</title>
</head>

<body>

    <header>
        <h1>Tic Tac Toe</h1>
    </header>

    <dialog id="playerDialog">

        <form id="playerForm">

            <h2>Player Setup</h2>

            <label for="playerNameInput">Name</label>
            <input id="playerNameInput" type="text" maxlength="15" required>

            <p id="nameError">Name cannot contain only spaces</p>

            <p>Choose your marker</p>

            <div id="markerContainer">

                <button type="button" class="markerBtn" data-marker="X">X</button>

                <button type="button" class="markerBtn" data-marker="O">O</button>

                <button type="button" class="markerBtn" data-marker="V">V</button>

            </div>

            <p id="markerError">A marker should be chosen.</p>

            <button id="continueBtn" type="submit">Continue</button>

        </form>

    </dialog>

    <main>

        <section id="playerOne" class="playerCard">

            <h2>Player 1</h2>

            <div>
                <p class="label">Name</p>
                <p id="playerOneName">-</p>
            </div>

            <div>
                <p class="label">Marker</p>
                <p id="playerOneMarker">-</p>
            </div>

            <div>
                <p class="label">Score</p>
                <p id="playerOneScore">0</p>
            </div>

        </section>

        <section id="gameArea">

            <h2 id="gameStatus">Press Start to Begin</h2>

            <div id="board">

                <button class="cell" data-row="0" data-col="0"></button>
                <button class="cell" data-row="0" data-col="1"></button>
                <button class="cell" data-row="0" data-col="2"></button>

                <button class="cell" data-row="1" data-col="0"></button>
                <button class="cell" data-row="1" data-col="1"></button>
                <button class="cell" data-row="1" data-col="2"></button>

                <button class="cell" data-row="2" data-col="0"></button>
                <button class="cell" data-row="2" data-col="1"></button>
                <button class="cell" data-row="2" data-col="2"></button>

            </div>

            <button id="startBtn">Start Game</button>

            <button id="restartBtn" hidden>Restart Game</button>

        </section>

        <section id="playerTwo" class="playerCard">

            <h2>Player 2</h2>

            <div>
                <p class="label">Name</p>
                <p id="playerTwoName">-</p>
            </div>

            <div>
                <p class="label">Marker</p>
                <p id="playerTwoMarker">-</p>
            </div>

            <div>
                <p class="label">Score</p>
                <p id="playerTwoScore">0</p>
            </div>

        </section>

    </main>

</body>

</html>
